site_name: Chacana
site_description: A tensor calculus DSL with static type checking
site_url: https://sashakile.github.io/chacana/
repo_url: https://github.com/sashakile/chacana
repo_name: sashakile/chacana

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Expressions: guide/expressions.md
      - TOML Context: guide/context.md
      - Type Checking: guide/type-checking.md
      - Differential Geometry: guide/diffgeom.md
  - API Reference:
      - chacana: api/index.md
      - chacana.ast: api/ast.md
      - chacana.grammar: api/grammar.md
      - chacana.context: api/context.md
      - chacana.checker: api/checker.md
      - chacana.visitor: api/visitor.md
      - chacana.errors: api/errors.md
  - Playground: playground.md
  - Development: development.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - def_list

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
